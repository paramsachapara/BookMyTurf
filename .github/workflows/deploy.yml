steps:
  - name: Deploy
    run: |
      cd $APP_DIR

      git fetch origin
      git reset --hard origin/main   # 🔥 FORCE SYNC
      git clean -fd                  # 🔥 REMOVE extra files

      npm install

      pm2 describe $APP_NAME > /dev/null \
        && pm2 reload $APP_NAME \
        || pm2 start npm --name $APP_NAME -- start

      pm2 save