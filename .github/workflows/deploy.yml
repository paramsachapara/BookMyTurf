name: Deploy to Production

on:
  push:
    branches:
      - main   # ONLY MAIN TRIGGERS

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: 100.86.30.24
          username: root
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            cd /root/BookMyTurf
            git pull origin main
            npm install
            pm2 restart e-management
